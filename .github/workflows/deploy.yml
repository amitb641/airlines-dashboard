name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify index.html exists
        run: test -f index.html || { echo "ERROR: index.html not found"; exit 1; }
      - name: Verify index.html is non-empty
        run: test -s index.html || { echo "ERROR: index.html is empty"; exit 1; }
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v4
      - id: deployment
        uses: actions/deploy-pages@v4
